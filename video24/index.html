<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 2px solid blue;
            padding: 34px;
           box-shadow: 5px 5px 15px 5px #11d131; 
        }

        .text-shadow{
             text-shadow: 2px 2px 4px #dd1111;
             outline: 2px solid black;
             border: 2px solid blue; 
             outline-offset: 3px;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>

    <div>
        <p class="text-shadow">
            Lorem ipsum, dolor sit amet consectetur adipisicing elit. Aspernatur culpa sapiente dolore, exercitationem et facilis minus voluptatem laboriosam blanditiis quod consequatur nihil, a architecto molestias! Id amet molestiae odit repellendus eos hic, voluptatum maxime.
        </p>
    </div>
</body>
</html>
