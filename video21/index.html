<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* The specifity of this selector is 1 */
        h1{
            color: green;
        }

        /* The specifity of this selector is 1+10=11*/
        h1.yellow{
            color: yellow;
        }

        /* The specifity of this selector is 10 */
        .cred{
            color: red;
        }

        /* The specifity of this selector is 10 */
        .cpurple{
            color:darkorchid ;
        }

        /* This is the example of attribute selector.The specifity of this selector is 10 */ 
        [data-x="a"]{
            color: black;
        }

    </style>
</head>
<body>
    <h1 class="yellow cred cpurple" data-x="a">CSS SPECIFITY</h1>
</body>
</html>
