!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37 Video</title>
    <style>
        body {
            background-color: aqua;
        }

        * {
            margin: 0;
        }

        .header {
            height: 200px;
            background-color: red;
            position: sticky;
            top: 0;
        }


        .box {
            height: 80vh;
            background-color: blue;
            margin: 60px;
            display: flex;
        }

        .box1{
            height: 900px;
            width: 800px;
            /* margin: 500px; */
            border: 2px solid black;
            background-color: blueviolet;
            justify-content: space-around;
        }
        .box2{
            background-color: brown;
        }

        

        .div1 {
            display: flex;
            height: 400px;
            margin: 50px;
            border: 2px solid black;
            border-radius: 150px;
            color: deeppink;
            font-size: 120px;
            border-color: yellow;
            background-color: chartreuse;
            justify-content: center;
            align-items: center;
        }

        .footer {
            height: 200px;
            margin: 60px;
            background-color: red;
        }

        .logo{
            height: 90px;
            width: 90px;
            border: 2px solid black;
            border-radius: 150px;
            background-color: black;
            display: flex;
            justify-content: flex-end;
            position:sticky ;
            bottom: 0;
            text-align: right;
        }

    </style>
</head>

<body>
    <div class="header"></div>
    
    <div class="box">
        <div class="box1"></div>
        <div class="box1 box2"></div>
    </div>

    <div class="div1">
        <p>
        Welcome to this Sigma Web Development Express </p>
    </div>

    <div class="logo"> </div>

    <div class="footer"></div>
</body>

</html>
