<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Box Model</title>
   <style>
    * {
        margin: 0;
        padding: 0;
    }
    .box{
        background-color: rgb(26, 214, 214);
    }

    .box1{
        color: yellow;
        padding: 10px;
        margin: 35px;
        border: 2px solid rgb(27, 27, 192);
        height: 200px;
        box-sizing: border-box;
    }

    .box2{
        color: rgb(231, 23, 23);
        padding: 10px;
        margin: 25px;
        border: 2px solid rgb(44, 9, 9);
        height: 200px;
        box-sizing: border-box;
    }
   </style>

</head>
<body>
    <div class="box box1">I am a box</div>
   <div class="box box2">I am another box</div>
</body>
</html>
